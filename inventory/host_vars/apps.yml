authentik_secret_key: "{{ lookup('jaredhocutt.homelab.bws', 'authentik_secret_key') }}"

authentik_server_container_env:
  AUTHENTIK_EMAIL__HOST: "{{ lookup('jaredhocutt.homelab.bws', 'authentik_email_host') }}"
  AUTHENTIK_EMAIL__PORT: "{{ lookup('jaredhocutt.homelab.bws', 'authentik_email_port') }}"
