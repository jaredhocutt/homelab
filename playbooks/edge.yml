---

- name: Create infrastructure
  hosts: edge
  connection: local
  gather_facts: false
  environment:
    CLOUDFLARE_TOKEN: "{{ lookup('jaredhocutt.homelab.bws', 'cloudflare_token') }}"
    DIGITALOCEAN_TOKEN: "{{ lookup('jaredhocutt.homelab.bws', 'digitalocean_token') }}"
  tasks:
    - name: Look up existing edge droplet
      digitalocean.cloud.droplets_info:
        name: edge
      register: _edge_droplets_info
      tags: [always]

    - name: Set existing droplet fact
      ansible.builtin.set_fact:
        _edge_existing_droplet: "{{ _edge_droplets_info.droplets | first | default(none) }}"
      tags: [always]

    - name: Create droplet infrastructure
      when: _edge_existing_droplet is none
      tags: [always]
      block:
        - name: Create SSH keys
          digitalocean.cloud.ssh_key:
            name: "{{ item.split(' ')[-1] }}"
            public_key: "{{ item }}"
            state: present
          loop: "{{ droplet_ssh_keys }}"
          register: _edge_create_ssh_keys

        - name: Create droplet
          digitalocean.cloud.droplet:
            name: "edge"
            unique_name: true
            region: "{{ droplet_region }}"
            size: "{{ droplet_size }}"
            image: "{{ droplet_image }}"
            # Disabling due to error in Digotal Ocean install script for do-agent
            # monitoring: true
            ssh_keys: "{{ _edge_create_ssh_keys.results | map(attribute='ssh_key.id') | list }}"
            user_data: "{{ droplet_user_data }}"
            state: present
          register: _edge_create_droplet

        - name: Create reserved IP and assign to droplet
          digitalocean.cloud.reserved_ip:
            droplet_id: "{{ _edge_create_droplet.droplet.id }}"
            state: present
          register: _edge_create_reserved_ip

    - name: Set unified droplet ID fact
      ansible.builtin.set_fact:
        _edge_droplet_id: >-
          {{ _edge_existing_droplet.id
             if _edge_existing_droplet is not none
             else _edge_create_droplet.droplet.id }}
      tags: [always]

    - name: Look up reserved IP for edge droplet
      digitalocean.cloud.reserved_ips_info: {}
      register: _edge_reserved_ips_info
      tags: [always]

    - name: Set edge IP fact
      ansible.builtin.set_fact:
        _edge_ip: >-
          {{ _edge_reserved_ips_info.reserved_ips
             | selectattr('droplet', 'ne', none)
             | selectattr('droplet.name', 'equalto', 'edge')
             | map(attribute='ip')
             | first }}
      tags: [always]

    - name: Create default firewall and attach to droplet
      digitalocean.cloud.firewall:
        name: default
        inbound_rules: "{{ digitalocean_firewall_default_inbound_rules }}"
        outbound_rules: "{{ digitalocean_firewall_default_outbound_rules }}"
        droplet_ids:
          - "{{ _edge_droplet_id }}"
        state: present

    - name: Create pangolin firewall and attach to droplet
      digitalocean.cloud.firewall:
        name: pangolin
        inbound_rules: "{{ digitalocean_firewall_pangolin_inbound_rules }}"
        droplet_ids:
          - "{{ _edge_droplet_id }}"
        state: present

    # The digitalocean.cloud.firewall module does not support updating existing firewalls,
    # so we have to use the API directly ¯\_(ツ)_/¯

    - name: Get firewalls
      digitalocean.cloud.firewalls_info: {}
      register: _edge_firewalls_info

    - name: Set firewall ID facts
      ansible.builtin.set_fact:
        digitalocean_firewall_default_id: >-
          {{ _edge_firewalls_info.firewalls
            | selectattr('name', 'equalto', 'default')
            | map(attribute='id')
            | first }}
        digitalocean_firewall_pangolin_id: >-
          {{ _edge_firewalls_info.firewalls
            | selectattr('name', 'equalto', 'pangolin')
            | map(attribute='id')
            | first }}

    - name: Update default firewall rules via API
      ansible.builtin.uri:
        url: "https://api.digitalocean.com/v2/firewalls/{{ digitalocean_firewall_default_id }}"
        method: PUT
        headers:
          Authorization: Bearer {{ lookup('jaredhocutt.homelab.bws', 'digitalocean_token') }}
          Content-Type: application/json
        body_format: json
        body:
          name: default
          inbound_rules: "{{ digitalocean_firewall_default_inbound_rules }}"
          outbound_rules: "{{ digitalocean_firewall_default_outbound_rules }}"
          droplet_ids:
            - "{{ _edge_droplet_id }}"
        status_code: 200

    - name: Update pangolin firewall rules via API
      ansible.builtin.uri:
        url: "https://api.digitalocean.com/v2/firewalls/{{ digitalocean_firewall_pangolin_id }}"
        method: PUT
        headers:
          Authorization: Bearer {{ lookup('jaredhocutt.homelab.bws', 'digitalocean_token') }}
          Content-Type: application/json
        body_format: json
        body:
          name: pangolin
          inbound_rules: "{{ digitalocean_firewall_pangolin_inbound_rules }}"
          droplet_ids:
            - "{{ _edge_droplet_id }}"
        status_code: 200

    - name: Create wildcard DNS record for pangolin
      community.general.cloudflare_dns:
        zone: "{{ pangolin_base_domain.split('.')[-2:] | join('.') }}"
        record: "*.{{ pangolin_base_domain.split('.')[:-2] | join('.') }}"
        type: A
        value: "{{ _edge_ip }}"
        ttl: 300
        solo: true
        proxied: false
        state: present

    - name: Wait for SSH to be available
      ansible.builtin.wait_for:
        host: "{{ _edge_ip }}"
        port: 22
        timeout: 300

    - name: Add new droplet to inventory group
      ansible.builtin.add_host:
        name: edge
        ansible_host: "{{ _edge_ip }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      changed_when: false
      tags: [always]

- name: Perform initial server setup
  hosts: edge
  tasks:
    - name: Perform initial server setup
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.server_setup
      tags: [server_setup]

    - name: Install do_agent
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.do_agent
      tags: [do_agent]

- name: Deploy and configure apps
  hosts: edge
  tasks:
    - name: Wait for wildcard DNS record to propagate
      ansible.builtin.command:
        cmd: dig +short A test.{{ pangolin_base_domain }} @8.8.8.8
      delegate_to: localhost
      register: _edge_wildcard_dns_result
      until: _edge_wildcard_dns_result.stdout.strip() == _edge_ip
      retries: 30
      delay: 30  # 30 retries every 30 seconds = up to 15 minutes
      changed_when: false
      failed_when: _edge_wildcard_dns_result.rc != 0

    - name: Install backrest
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.backrest
      tags: [backrest]

    - name: Install pangolin
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.pangolin
      tags: [pangolin]
