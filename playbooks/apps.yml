      tags: [shelfmark]

    - name: Install snipe_it
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.snipe_it
      tags: [snipe_it]

    - name: Install stirling_pdf
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.stirling_pdf
      tags: [stirling_pdf]

    - name: Install tandoor
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.tandoor
      tags: [tandoor]

    - name: Install transfer_sh
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.transfer_sh
      tags: [transfer_sh]

    - name: Install uptime_kuma
      ansible.builtin.import_role:
        name: jaredhocutt.homelab.uptime_kuma
      tags: [uptime_kuma]

    - name: Install warracker
      ansible.builtin.import_role:
