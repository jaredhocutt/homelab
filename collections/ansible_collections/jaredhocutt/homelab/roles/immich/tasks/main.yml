---
# tasks file for jaredhocutt.homelab.immich

- name: Pull container images
  containers.podman.podman_image:
    name: "{{ item.image }}:{{ item.image_tag }}"
    state: present
  become: true
  loop:
    - image: "{{ immich_image }}"
      image_tag: "{{ immich_image_tag }}"
    - image: "{{ immich_machine_learning_image }}"
      image_tag: "{{ immich_machine_learning_image_tag }}"
    - image: "{{ immich_postgres_image }}"
      image_tag: "{{ immich_postgres_image_tag }}"
    - image: "{{ immich_redis_image }}"
      image_tag: "{{ immich_redis_image_tag }}"

- name: Create network
  containers.podman.podman_network:
    name: "{{ immich_name }}"
    driver: bridge
    disable_dns: false
    opt:
      isolate: "true"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true

- name: Create volumes
  containers.podman.podman_volume:
    name: "{{ item.name }}"
    quadlet_options: "{{ item.options | default(omit) }}"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true
  loop:
    - name: "{{ immich_volume_data }}"
      options: "{{ immich_volume_data_options | default(omit) }}"
    - name: "{{ immich_machine_learning_volume_cache }}"
      options: "{{ immich_machine_learning_volume_cache_options | default(omit) }}"
    - name: "{{ immich_postgres_volume_data }}"
      options: "{{ immich_postgres_volume_data_options | default(omit) }}"
    - name: "{{ immich_redis_volume_data }}"
      options: "{{ immich_redis_volume_data_options | default(omit) }}"

- name: Create secrets
  containers.podman.podman_secret:
    name: "{{ item.key }}"
    data: "{{ item.value }}"
    state: present
  become: true
  loop: "{{ immich_secrets_combined | dict2items }}"

- name: Create postgres container
  containers.podman.podman_container:
    name: "{{ immich_name }}-postgres"
    image: "{{ immich_postgres_image }}:{{ immich_postgres_image_tag }}"
    network: "{{ immich_name }}.network"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env', container='postgres') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets', container='postgres') }}"
    volumes:
      - "{{ immich_postgres_volume_data }}.volume:/var/lib/postgresql/data"
    shm_size: 128mb
    healthcheck_interval: 30s
    healthcheck_retries: 5
    healthcheck_start_period: 20s
    healthcheck_timeout: 5s
    healthcheck: CMD-SHELL pg_isready -d {{ immich_postgres_db_name }} -U {{ immich_postgres_user }}
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels', container='postgres') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options', container='postgres') }}"
    state: quadlet
  notify: Restart postgres for {{ immich_name }}
  become: true

- name: Create redis container
  containers.podman.podman_container:
    name: "{{ immich_name }}-redis"
    image: "{{ immich_redis_image }}:{{ immich_redis_image_tag }}"
    network: "{{ immich_name }}.network"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env', container='redis') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets', container='redis') }}"
    volumes:
      - "{{ immich_redis_volume_data }}.volume:/data"
    healthcheck_interval: 30s
    healthcheck_retries: 5
    healthcheck_start_period: 20s
    healthcheck_timeout: 3s
    healthcheck: CMD-SHELL redis-cli ping | grep PONG
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels', container='redis') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options', container='redis') }}"
    state: quadlet
  notify: Restart redis for {{ immich_name }}
  become: true

- name: Create machine_learning container
  containers.podman.podman_container:
    name: "{{ immich_name }}-machine-learning"
    image: "{{ immich_image }}:{{ immich_image_tag }}"
    network: "{{ immich_name }}.network"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env', container='machine_learning') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets', container='machine_learning') }}"
    volumes:
      - "{{ immich_machine_learning_volume_cache }}.volume:/cache"
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels', container='machine_learning') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options', container='machine_learning') }}"
    state: quadlet
  notify: Restart machine_learning for {{ immich_name }}
  become: true

- name: Create immich container
  containers.podman.podman_container:
    name: "{{ immich_name }}"
    image: "{{ immich_image }}:{{ immich_image_tag }}"
    network:
      - "{{ immich_name }}.network"
      - "{{ immich_traefik_enable | ternary(common_traefik_network ~ '.network', omit) }}"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets') }}"
    volumes:
      - "{{ immich_volume_data }}.volume:/data"
      - /etc/localtime:/etc/localtime:ro
    publish: "{{ immich_traefik_enable | ternary(omit, immich_ports) }}"
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options') }}"
    state: quadlet
  notify: Restart {{ immich_name }}
  become: true

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
