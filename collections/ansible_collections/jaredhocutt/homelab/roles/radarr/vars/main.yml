---
# vars file for jaredhocutt.homelab.radarr

###############################################################################
# Envrionment
###############################################################################

radarr_container_env_defaults: {}

###############################################################################
# Secrets
###############################################################################

radarr_secrets_defaults: {}

radarr_secrets_combined: >-
  {{ radarr_secrets_defaults
  | combine(radarr_secrets, recursive=True) }}

radarr_container_secrets_defaults: []

###############################################################################
# Container Labels
###############################################################################

radarr_container_labels_defaults: >
  {{ radarr_traefik_enable
  | ternary(lookup('jaredhocutt.homelab.traefik_labels', radarr_name, radarr_traefik_host, '7878'), {}) }}

###############################################################################
# Quadlet Options
###############################################################################

radarr_container_quadlet_options_defaults: "{{ common_quadlet_options_defaults }}"
