---
# tasks file for jaredhocutt.homelab.server_setup

- name: Install packages and enable services
  ansible.builtin.include_tasks: packages.yml

- name: Install and configure dnf-automatic
  ansible.builtin.include_tasks: dnf_automatic.yml
  when: server_setup_dnf_automatic

- name: Create and configure users
  ansible.builtin.include_tasks: users.yml
  when: server_setup_users | length > 0

- name: Install and configure fail2ban
  ansible.builtin.include_tasks: fail2ban.yml
  when: server_setup_fail2ban

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
