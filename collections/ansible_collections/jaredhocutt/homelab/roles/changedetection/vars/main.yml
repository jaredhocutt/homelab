---
# vars file for jaredhocutt.homelab.changedetection

###############################################################################
# Envrionment
###############################################################################

changedetection_container_env_defaults:
  PLAYWRIGHT_DRIVER_URL: "ws://{{ changedetection_name }}-browser:3000"

changedetection_browser_container_env_defaults:
  SCREEN_WIDTH: "1920"
  SCREEN_HEIGHT: "1024"
  SCREEN_DEPTH: "16"
  MAX_CONCURRENT_CHROME_PROCESSES: "10"

###############################################################################
# Secrets
###############################################################################

changedetection_secrets_defaults: {}

changedetection_secrets_combined: >-
  {{ changedetection_secrets_defaults
  | combine(changedetection_secrets, recursive=True) }}

changedetection_container_secrets_defaults: []

changedetection_browser_container_secrets_defaults: []

###############################################################################
# Container Labels
###############################################################################

changedetection_container_labels_defaults: >
  {{ changedetection_traefik_enable
  | ternary(lookup('jaredhocutt.homelab.traefik_labels', changedetection_name, changedetection_traefik_host, '5000'), {}) }}

changedetection_browser_container_labels_defaults: {}

###############################################################################
# Quadlet Options
###############################################################################

changedetection_quadlet_options_depends:
  - |
    [Unit]
    Requires={{ changedetection_name }}-browser.service
    After={{ changedetection_name }}-browser.service
changedetection_container_quadlet_options_defaults: "{{ common_quadlet_options_defaults + changedetection_quadlet_options_depends }}"

changedetection_browser_container_quadlet_options_defaults: "{{ common_quadlet_options_defaults }}"
