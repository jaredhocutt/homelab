---

- name: Stop services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  become: true
  failed_when: false
  loop:
    - "{{ snipe_it_name }}.service"
    - "{{ snipe_it_name }}-mariadb.service"

- name: Destroy containers
  containers.podman.podman_container:
    name: "{{ item }}"
    state: absent
  become: true
  loop:
    - "{{ snipe_it_name }}"
    - "{{ snipe_it_name }}-mariadb"

- name: Destroy secrets
  containers.podman.podman_secret:
    name: "{{ item.key }}"
    state: absent
  become: true
  no_log: true
  loop: "{{ snipe_it_secrets_combined | dict2items }}"

- name: Destroy volumes
  containers.podman.podman_volume:
    name: "{{ item }}"
    state: absent
  become: true
  loop:
    - "{{ snipe_it_volume_data }}"
    - "{{ snipe_it_mariadb_volume_data }}"

- name: Destroy network
  containers.podman.podman_network:
    name: "{{ snipe_it_name }}"
    state: absent
  become: true

- name: Cleanup quadlet files
  ansible.builtin.file:
    path: /etc/containers/systemd/{{ item }}
    state: absent
  become: true
  loop:
    - "{{ snipe_it_name }}.container"
    - "{{ snipe_it_name }}-mariadb.container"
    - "{{ snipe_it_volume_data }}.volume"
    - "{{ snipe_it_mariadb_volume_data }}.volume"
    - "{{ snipe_it_name }}.network"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
