---
# tasks file for jaredhocutt.homelab.go2rtc

- name: Pull container images
  containers.podman.podman_image:
    name: "{{ item.image }}:{{ item.image_tag }}"
    state: present
  become: true
  loop:
    - image: "{{ go2rtc_image }}"
      image_tag: "{{ go2rtc_image_tag }}"

- name: Create network
  containers.podman.podman_network:
    name: "{{ go2rtc_name }}"
    driver: bridge
    disable_dns: false
    opt:
      isolate: "true"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true

- name: Create volumes
  containers.podman.podman_volume:
    name: "{{ item.name }}"
    quadlet_options: "{{ item.options | default(omit) }}"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true
  loop:
    - name: "{{ go2rtc_volume_config }}"
      options: "{{ go2rtc_volume_config_options | default(omit) }}"

- name: Create secrets
  containers.podman.podman_secret:
    name: "{{ item.key }}"
    data: "{{ item.value }}"
    state: present
  become: true
  loop: "{{ go2rtc_secrets_combined | dict2items }}"

- name: Create go2rtc container
  containers.podman.podman_container:
    name: "{{ go2rtc_name }}"
    image: "{{ go2rtc_image }}:{{ go2rtc_image_tag }}"
    network:
      - "{{ go2rtc_name }}.network"
      - "{{ go2rtc_traefik_enable | ternary(common_traefik_network ~ '.network', omit) }}"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets') }}"
    volumes:
      - "{{ go2rtc_volume_config }}:/config"
    publish: "{{ go2rtc_traefik_enable | ternary(omit, go2rtc_ports) }}"
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options') }}"
    state: quadlet
  notify: Restart {{ go2rtc_name }}
  become: true

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
