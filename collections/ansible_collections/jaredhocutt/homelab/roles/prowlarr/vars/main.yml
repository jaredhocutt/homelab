---
# vars file for jaredhocutt.homelab.prowlarr

###############################################################################
# Envrionment
###############################################################################

prowlarr_container_env_defaults: {}

###############################################################################
# Secrets
###############################################################################

prowlarr_secrets_defaults: {}

prowlarr_secrets_combined: >-
  {{ prowlarr_secrets_defaults
  | combine(prowlarr_secrets, recursive=True) }}

prowlarr_container_secrets_defaults: []

###############################################################################
# Container Labels
###############################################################################

prowlarr_container_labels_defaults: >
  {{ prowlarr_traefik_enable
  | ternary(lookup('jaredhocutt.homelab.traefik_labels', prowlarr_name, prowlarr_traefik_host, '9696'), {}) }}

###############################################################################
# Quadlet Options
###############################################################################

prowlarr_container_quadlet_options_defaults: "{{ common_quadlet_options_defaults }}"
