---
# tasks file for jaredhocutt.homelab.seerr

- name: Pull container images
  containers.podman.podman_image:
    name: "{{ item.image }}:{{ item.image_tag }}"
    state: present
  become: true
  loop:
    - image: "{{ seerr_image }}"
      image_tag: "{{ seerr_image_tag }}"

- name: Create network
  containers.podman.podman_network:
    name: "{{ seerr_name }}"
    driver: bridge
    disable_dns: false
    opt:
      isolate: "true"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true

- name: Create volumes
  containers.podman.podman_volume:
    name: "{{ item.name }}"
    quadlet_options: "{{ item.options | default(omit) }}"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true
  loop:
    - name: "{{ seerr_volume_config }}"
      options: "{{ seerr_volume_config_options | default(omit) }}"

- name: Create secrets
  containers.podman.podman_secret:
    name: "{{ item.key }}"
    data: "{{ item.value }}"
    state: present
  become: true
  loop: "{{ seerr_secrets_combined | dict2items }}"

- name: Create seerr container
  containers.podman.podman_container:
    name: "{{ seerr_name }}"
    image: "{{ seerr_image }}:{{ seerr_image_tag }}"
    network:
      - "{{ seerr_name }}.network"
      - "{{ seerr_traefik_enable | ternary(common_traefik_network ~ '.network', omit) }}"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets') }}"
    volumes:
      - "{{ seerr_volume_config }}:/app/config"
    init: true
    healthcheck_interval: 15s
    healthcheck_retries: 3
    healthcheck_start_period: 20s
    healthcheck_timeout: 3s
    healthcheck: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
    publish: "{{ seerr_traefik_enable | ternary(omit, seerr_ports) }}"
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options') }}"
    state: quadlet
  notify: Restart {{ seerr_name }}
  become: true

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
