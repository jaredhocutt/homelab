---
# defaults file for jaredhocutt.homelab.karakeep

karakeep_name: karakeep

karakeep_image: ghcr.io/karakeep-app/karakeep
karakeep_image_tag: release
karakeep_browserless_image: ghcr.io/browserless/chromium
karakeep_browserless_image_tag: latest
karakeep_meilisearch_image: docker.io/getmeili/meilisearch
karakeep_meilisearch_image_tag: latest

karakeep_volume_data: "{{ karakeep_name }}-data"
karakeep_meilisearch_volume_data: "{{ karakeep_name }}-meilisearch-data"

karakeep_traefik_enable: true
karakeep_traefik_host: "{{ karakeep_name }}.{{ common_traefik_domain }}"
karakeep_ports:
  - 3000:3000

karakeep_secrets: {}

karakeep_container_env: {}
karakeep_container_secrets: []
karakeep_container_labels: {}
karakeep_container_quadlet_options: []

karakeep_browserless_container_env: {}
karakeep_browserless_container_secrets: []
karakeep_browserless_container_labels: {}
karakeep_browserless_container_quadlet_options: []

karakeep_meilisearch_container_env: {}
karakeep_meilisearch_container_secrets: []
karakeep_meilisearch_container_labels: {}
karakeep_meilisearch_container_quadlet_options: []

karakeep_nextauth_url: http://localhost:3000
