---
# tasks file for jaredhocutt.homelab.karakeep

- name: Pull container images
  containers.podman.podman_image:
    name: "{{ item.image }}:{{ item.image_tag }}"
    state: present
  become: true
  loop:
    - image: "{{ karakeep_image }}"
      image_tag: "{{ karakeep_image_tag }}"
    - image: "{{ karakeep_browserless_image }}"
      image_tag: "{{ karakeep_browserless_image_tag }}"
    - image: "{{ karakeep_meilisearch_image }}"
      image_tag: "{{ karakeep_meilisearch_image_tag }}"

- name: Create network
  containers.podman.podman_network:
    name: "{{ karakeep_name }}"
    driver: bridge
    disable_dns: false
    opt:
      isolate: "true"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true

- name: Create volumes
  containers.podman.podman_volume:
    name: "{{ item.name }}"
    quadlet_options: "{{ item.options | default(omit) }}"
    quadlet_file_mode: "0600"
    state: quadlet
  become: true
  loop:
    - name: "{{ karakeep_volume_data }}"
      options: "{{ karakeep_volume_data_options | default(omit) }}"
    - name: "{{ karakeep_meilisearch_volume_data }}"
      options: "{{ karakeep_meilisearch_volume_data_options | default(omit) }}"

- name: Create secrets
  containers.podman.podman_secret:
    name: "{{ item.key }}"
    data: "{{ item.value }}"
    state: present
  become: true
  loop: "{{ karakeep_secrets_combined | dict2items }}"

- name: Create browserless container
  containers.podman.podman_container:
    name: "{{ karakeep_name }}-browserless"
    image: "{{ karakeep_browserless_image }}:{{ karakeep_browserless_image_tag }}"
    network: "{{ karakeep_name }}.network"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env', container='browserless') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets', container='browserless') }}"
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels', container='browserless') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options', container='browserless') }}"
    state: quadlet
  notify: Restart browserless for {{ karakeep_name }}
  become: true

- name: Create meilisearch container
  containers.podman.podman_container:
    name: "{{ karakeep_name }}-meilisearch"
    image: "{{ karakeep_meilisearch_image }}:{{ karakeep_meilisearch_image_tag }}"
    network: "{{ karakeep_name }}.network"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env', container='meilisearch') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets', container='meilisearch') }}"
    volumes:
      - "{{ karakeep_meilisearch_volume_data }}.volume:/meili_data"
    healthcheck_interval: 30s
    healthcheck_retries: 5
    healthcheck_start_period: 20s
    healthcheck_timeout: 5s
    healthcheck: CMD-SHELL curl -f http://localhost:7700/health
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels', container='meilisearch') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options', container='meilisearch') }}"
    state: quadlet
  notify: Restart meilisearch for {{ karakeep_name }}
  become: true

- name: Create karakeep container
  containers.podman.podman_container:
    name: "{{ karakeep_name }}"
    image: "{{ karakeep_image }}:{{ karakeep_image_tag }}"
    network:
      - "{{ karakeep_name }}.network"
      - "{{ karakeep_traefik_enable | ternary(common_traefik_network ~ '.network', omit) }}"
    env: "{{ lookup('jaredhocutt.homelab.container_config', 'env') }}"
    secrets: "{{ lookup('jaredhocutt.homelab.container_config', 'secrets') }}"
    volumes:
      - "{{ karakeep_volume_data }}.volume:/data"
    publish: "{{ karakeep_traefik_enable | ternary(omit, karakeep_ports) }}"
    labels: "{{ lookup('jaredhocutt.homelab.container_config', 'labels') }}"
    quadlet_file_mode: "0600"
    quadlet_options: "{{ lookup('jaredhocutt.homelab.container_config', 'quadlet_options') }}"
    state: quadlet
  notify: Restart {{ karakeep_name }}
  become: true

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
