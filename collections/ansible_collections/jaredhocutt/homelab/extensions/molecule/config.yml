---
driver:
  name: podman
platforms:
  - name: instance
    image: quay.io/fedora/fedora:latest
    dockerfile: ../Dockerfile.j2
    systemd: always
    command: /usr/sbin/init
    privileged: true
    capabilities:
      - SYS_ADMIN
provisioner:
  name: ansible
  playbooks:
    prepare: ../prepare.yml
    converge: converge.yml
    verify: verify.yml
scenario:
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
