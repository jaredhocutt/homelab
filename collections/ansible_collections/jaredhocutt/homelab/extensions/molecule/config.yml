---
driver:
  name: podman
platforms:
  - name: instance
    image: registry.fedoraproject.org/fedora-toolbox:43
    dockerfile: ../Dockerfile.j2
    systemd: always
    command: /usr/sbin/init
    privileged: true
    capabilities:
      - SYS_ADMIN
provisioner:
  name: ansible
  playbooks:
    prepare: ../prepare.yml
    converge: converge.yml
    verify: verify.yml
ansible:
  cfg:
    defaults:
      remote_tmp: /tmp/.ansible/tmp
scenario:
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
