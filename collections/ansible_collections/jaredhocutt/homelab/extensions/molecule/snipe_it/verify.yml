---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - snipe-it.network
      - snipe-it-data.volume
      - snipe-it-mariadb-data.volume
      - snipe-it-mariadb.container
      - snipe-it.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read snipe-it container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/snipe-it.container"
      register: container_quadlet

    - name: Assert snipe-it container quadlet has the expected image and ports
      ansible.builtin.assert:
        that:
          - "'docker.io/snipe/snipe-it' in (container_quadlet.content | b64decode)"
          - "'8000:80' in (container_quadlet.content | b64decode)"

    - name: Read mariadb container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/snipe-it-mariadb.container"
      register: mariadb_quadlet

    - name: Assert mariadb container quadlet has the expected image
      ansible.builtin.assert:
        that:
          - "'docker.io/library/mariadb:11' in (mariadb_quadlet.content | b64decode)"
