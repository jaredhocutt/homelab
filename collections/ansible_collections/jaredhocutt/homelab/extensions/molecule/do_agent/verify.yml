---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - do-agent.network
      - do-agent.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read do-agent container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/do-agent.container"
      register: container_quadlet

    - name: Assert do-agent container quadlet has the expected image and host mounts
      ansible.builtin.assert:
        that:
          - "'docker.io/digitalocean/do-agent' in (container_quadlet.content | b64decode)"
          - "'/proc:/host/proc:ro' in (container_quadlet.content | b64decode)"
          - "'/sys:/host/sys:ro' in (container_quadlet.content | b64decode)"
