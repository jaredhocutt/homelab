---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - palworld.network
      - palworld-saved.volume
      - palworld-scripts.volume
      - palworld.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read palworld container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/palworld.container"
      register: container_quadlet

    - name: Assert palworld container quadlet has the expected image, volumes, and entrypoint
      ansible.builtin.assert:
        that:
          - "'ghcr.io/pocketpairjp/palserver' in (container_quadlet.content | b64decode)"
          - "'palworld-saved:/pal/Package/Pal/Saved' in (container_quadlet.content | b64decode)"
          - "'palworld-scripts:/pal/scripts:ro' in (container_quadlet.content | b64decode)"
          - "'/pal/scripts/helper.sh' in (container_quadlet.content | b64decode)"

    - name: Get scripts volume info
      containers.podman.podman_volume_info:
        name: palworld-scripts
      register: scripts_volume_info

    - name: Stat helper.sh in the scripts volume
      ansible.builtin.stat:
        path: "{{ scripts_volume_info.volumes[0].Mountpoint }}/helper.sh"
      register: helper_script

    - name: Assert helper.sh was copied with the expected mode
      ansible.builtin.assert:
        that:
          - helper_script.stat.exists
          - helper_script.stat.mode == "0755"
