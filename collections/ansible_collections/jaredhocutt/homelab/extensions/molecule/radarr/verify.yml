---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - radarr.network
      - radarr-config.volume
      - radarr-download.volume
      - radarr-media.volume
      - radarr.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read radarr container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/radarr.container"
      register: container_quadlet

    - name: Assert radarr container quadlet has the expected image, volumes, and ports
      ansible.builtin.assert:
        that:
          - "'lscr.io/linuxserver/radarr' in (container_quadlet.content | b64decode)"
          - "'radarr-config:/config' in (container_quadlet.content | b64decode)"
          - "'radarr-download:/mnt/download' in (container_quadlet.content | b64decode)"
          - "'radarr-media:/mnt/media' in (container_quadlet.content | b64decode)"
          - "'7878:7878' in (container_quadlet.content | b64decode)"
