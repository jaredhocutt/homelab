---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - changedetection.network
      - changedetection-data.volume
      - changedetection-browser.container
      - changedetection.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read changedetection container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/changedetection.container"
      register: container_quadlet

    - name: Assert changedetection container quadlet has the expected image and ports
      ansible.builtin.assert:
        that:
          - "'ghcr.io/dgtlmoon/changedetection.io' in (container_quadlet.content | b64decode)"
          - "'5000:5000' in (container_quadlet.content | b64decode)"

    - name: Read browser container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/changedetection-browser.container"
      register: browser_quadlet

    - name: Assert browser container quadlet has the expected image and cap
      ansible.builtin.assert:
        that:
          - "'docker.io/dgtlmoon/sockpuppetbrowser' in (browser_quadlet.content | b64decode)"
          - "'AddCapability=SYS_ADMIN' in (browser_quadlet.content | b64decode)"
