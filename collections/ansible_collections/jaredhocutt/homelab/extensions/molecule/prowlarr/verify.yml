---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - prowlarr.network
      - prowlarr-config.volume
      - prowlarr.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read prowlarr container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/prowlarr.container"
      register: container_quadlet

    - name: Assert prowlarr container quadlet has the expected image, volume, and ports
      ansible.builtin.assert:
        that:
          - "'lscr.io/linuxserver/prowlarr' in (container_quadlet.content | b64decode)"
          - "'prowlarr-config:/config' in (container_quadlet.content | b64decode)"
          - "'9696:9696' in (container_quadlet.content | b64decode)"
