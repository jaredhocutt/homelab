---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - sonarr.network
      - sonarr-config.volume
      - sonarr-download.volume
      - sonarr-media.volume
      - sonarr.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read sonarr container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/sonarr.container"
      register: container_quadlet

    - name: Assert sonarr container quadlet has the expected image, volumes, and ports
      ansible.builtin.assert:
        that:
          - "'lscr.io/linuxserver/sonarr' in (container_quadlet.content | b64decode)"
          - "'sonarr-config:/config' in (container_quadlet.content | b64decode)"
          - "'sonarr-download:/mnt/download' in (container_quadlet.content | b64decode)"
          - "'sonarr-media:/mnt/media' in (container_quadlet.content | b64decode)"
          - "'8989:8989' in (container_quadlet.content | b64decode)"
