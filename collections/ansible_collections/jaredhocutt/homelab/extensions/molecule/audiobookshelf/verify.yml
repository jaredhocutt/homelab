---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - audiobookshelf.network
      - audiobookshelf-config.volume
      - audiobookshelf-metadata.volume
      - audiobookshelf-audiobooks.volume
      - audiobookshelf-podcasts.volume
      - audiobookshelf.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/audiobookshelf.container"
      register: container_quadlet

    - name: Assert container quadlet has the expected image and volumes
      ansible.builtin.assert:
        that:
          - "'ghcr.io/advplyr/audiobookshelf' in (container_quadlet.content | b64decode)"
          - "'audiobookshelf-config:/config' in (container_quadlet.content | b64decode)"
          - "'audiobookshelf-metadata:/metadata' in (container_quadlet.content | b64decode)"
          - "'audiobookshelf-audiobooks:/audiobooks' in (container_quadlet.content | b64decode)"
          - "'audiobookshelf-podcasts:/podcasts' in (container_quadlet.content | b64decode)"
          - "'13378:80' in (container_quadlet.content | b64decode)"

    - name: Read network quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/audiobookshelf.network"
      register: network_quadlet

    - name: Assert network quadlet uses the bridge driver
      ansible.builtin.assert:
        that:
          - "'Driver=bridge' in (network_quadlet.content | b64decode)"
