---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - transfer-sh.network
      - transfer-sh-transfers.volume
      - transfer-sh.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read transfer-sh container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/transfer-sh.container"
      register: container_quadlet

    - name: Assert transfer-sh container quadlet has the expected image, volume, ports, and command
      ansible.builtin.assert:
        that:
          - "'docker.io/dutchcoders/transfer.sh' in (container_quadlet.content | b64decode)"
          - "'transfer-sh-transfers:/transfers' in (container_quadlet.content | b64decode)"
          - "'8080:8080' in (container_quadlet.content | b64decode)"
          - "'--provider local' in (container_quadlet.content | b64decode)"
          - "'--basedir /transfers' in (container_quadlet.content | b64decode)"
