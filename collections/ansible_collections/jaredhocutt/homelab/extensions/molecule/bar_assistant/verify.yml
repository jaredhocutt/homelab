---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - bar-assistant.network
      - bar-assistant-data.volume
      - bar-assistant-redis-data.volume
      - bar-assistant-meilisearch-data.volume
      - bar-assistant-redis.container
      - bar-assistant-meilisearch.container
      - bar-assistant.container
      - bar-assistant-salt-rim.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read bar-assistant container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/bar-assistant.container"
      register: container_quadlet

    - name: Assert bar-assistant container quadlet has the expected image and ports
      ansible.builtin.assert:
        that:
          - "'docker.io/barassistant/server' in (container_quadlet.content | b64decode)"
          - "'8082:8080' in (container_quadlet.content | b64decode)"

    - name: Read salt-rim container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/bar-assistant-salt-rim.container"
      register: salt_rim_quadlet

    - name: Assert salt-rim container quadlet has the expected image and ports
      ansible.builtin.assert:
        that:
          - "'docker.io/barassistant/salt-rim' in (salt_rim_quadlet.content | b64decode)"
          - "'8080:8080' in (salt_rim_quadlet.content | b64decode)"
