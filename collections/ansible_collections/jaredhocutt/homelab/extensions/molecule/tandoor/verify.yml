---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - tandoor.network
      - tandoor-staticfiles.volume
      - tandoor-mediafiles.volume
      - tandoor-postgres-data.volume
      - tandoor-postgres.container
      - tandoor.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read tandoor container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/tandoor.container"
      register: container_quadlet

    - name: Assert tandoor container quadlet has the expected image and ports
      ansible.builtin.assert:
        that:
          - "'docker.io/vabene1111/recipes' in (container_quadlet.content | b64decode)"
          - "'80:80' in (container_quadlet.content | b64decode)"
