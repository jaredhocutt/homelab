---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /etc/containers/systemd
    expected_quadlets:
      - healthchecks.network
      - healthchecks-config.volume
      - healthchecks.container
  tasks:
    - name: Stat each expected quadlet file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: quadlet_stats
      loop: "{{ expected_quadlets }}"

    - name: Assert each quadlet file exists with the expected mode
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
          - item.stat.mode == "0600"
        fail_msg: "Quadlet {{ item.item }} missing or has wrong mode/size"
      loop: "{{ quadlet_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read healthchecks container quadlet contents
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/healthchecks.container"
      register: container_quadlet

    - name: Assert healthchecks container quadlet has the expected image, volume, and ports
      ansible.builtin.assert:
        that:
          - "'lscr.io/linuxserver/healthchecks' in (container_quadlet.content | b64decode)"
          - "'healthchecks-config:/config' in (container_quadlet.content | b64decode)"
          - "'8000:8000' in (container_quadlet.content | b64decode)"
